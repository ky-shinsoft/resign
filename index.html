<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離職倒數計時器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 2rem 1rem 4rem;
            transition: background 0.8s ease;
        }

        /* Theme variables */
        body.theme-midnight {
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent: #ffd200;
            --accent2: #f7971e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-muted: #aaa;
            --particle-color: rgba(255, 210, 0, 0.3);
        }
        body.theme-sunset {
            --bg: linear-gradient(135deg, #1a0a2e, #6b1d5e, #e94560);
            --accent: #ff6b6b;
            --accent2: #feca57;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-muted: #cba;
            --particle-color: rgba(255, 107, 107, 0.3);
        }
        body.theme-ocean {
            --bg: linear-gradient(135deg, #0a1628, #1a3a5c, #0d7377);
            --accent: #00d2ff;
            --accent2: #3a7bd5;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-muted: #8cb4c9;
            --particle-color: rgba(0, 210, 255, 0.3);
        }
        body.theme-forest {
            --bg: linear-gradient(135deg, #0a1a0a, #1b4332, #2d6a4f);
            --accent: #95d5b2;
            --accent2: #52b788;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-muted: #8fae9b;
            --particle-color: rgba(149, 213, 178, 0.3);
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .target-date {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Theme switcher */
        .theme-switcher {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn.active { border-color: #fff; transform: scale(1.2); }
        .theme-btn[data-theme="midnight"] { background: linear-gradient(135deg, #302b63, #24243e); }
        .theme-btn[data-theme="sunset"] { background: linear-gradient(135deg, #6b1d5e, #e94560); }
        .theme-btn[data-theme="ocean"] { background: linear-gradient(135deg, #1a3a5c, #0d7377); }
        .theme-btn[data-theme="forest"] { background: linear-gradient(135deg, #1b4332, #2d6a4f); }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-block {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            min-width: 130px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .time-block:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .time-value {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(180deg, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .time-label {
            font-size: 1rem;
            color: #888;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .stat-chip {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 0.6rem 1.4rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }

        .stat-chip strong {
            color: var(--accent);
        }

        /* Progress */
        .progress-section {
            margin-top: 2.5rem;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            height: 16px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 1s ease;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Milestones */
        .milestones {
            display: flex;
            justify-content: space-between;
            margin-top: 0.4rem;
            padding: 0 0.2rem;
            position: relative;
        }

        .milestone {
            font-size: 0.7rem;
            color: #666;
            position: relative;
            transition: color 0.3s;
        }

        .milestone.reached {
            color: var(--accent);
        }

        .milestone::before {
            content: '';
            display: block;
            width: 2px;
            height: 6px;
            background: currentColor;
            margin: 2px auto 2px;
        }

        .progress-text {
            margin-top: 0.5rem;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .progress-text span {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* Daily quote */
        .daily-quote {
            margin-top: 2rem;
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
        }

        .daily-quote .quote-text {
            font-size: 1.15rem;
            color: #ddd;
            font-style: italic;
            line-height: 1.6;
        }

        .daily-quote .quote-author {
            margin-top: 0.6rem;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .daily-quote-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        /* Sections grid */
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            text-align: left;
        }

        .section-card h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        /* Check-in */
        .checkin-btn {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .checkin-btn:hover {
            background: var(--accent);
            color: #111;
        }

        .checkin-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #555;
            color: #555;
        }

        .checkin-btn:disabled:hover {
            background: transparent;
            color: #555;
        }

        .checkin-info {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .streak-badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            color: #111;
            font-weight: 700;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .checkin-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-top: 0.8rem;
        }

        .cal-day {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .cal-day.checked {
            background: var(--accent);
        }

        .cal-day.today {
            border: 1px solid var(--accent);
        }

        /* Bucket list */
        .bucket-input-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .bucket-input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
        }

        .bucket-input:focus {
            border-color: var(--accent);
        }

        .bucket-input::placeholder {
            color: #666;
        }

        .bucket-add-btn {
            padding: 0.6rem 1rem;
            background: var(--accent);
            color: #111;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .bucket-add-btn:hover {
            opacity: 0.8;
        }

        .bucket-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
        }

        .bucket-list::-webkit-scrollbar {
            width: 4px;
        }

        .bucket-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        .bucket-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
            color: #ccc;
        }

        .bucket-item input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .bucket-item.done .bucket-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .bucket-text {
            flex: 1;
        }

        .bucket-delete {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.3rem;
            transition: color 0.2s;
        }

        .bucket-delete:hover {
            color: #e94560;
        }

        /* Fun stats */
        .fun-stats {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .fun-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .fun-stat-val {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.05rem;
        }

        /* Mood tracker */
        .mood-row {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .mood-btn {
            font-size: 1.8rem;
            background: none;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            filter: grayscale(0.5);
        }

        .mood-btn:hover {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .mood-btn.selected {
            border-color: var(--accent);
            filter: grayscale(0);
            transform: scale(1.15);
        }

        .mood-history {
            display: flex;
            gap: 2px;
            justify-content: center;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .mood-dot {
            font-size: 1rem;
        }

        .mood-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* Message */
        .message {
            margin-top: 2rem;
            font-size: 1.3rem;
            color: #ccc;
            font-style: italic;
        }

        /* Celebration */
        .celebration h1 {
            font-size: 4rem;
            background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 2s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 1.5rem 0.8rem 3rem; }
            h1 { font-size: 2rem; }
            .countdown { gap: 0.8rem; }
            .time-block {
                min-width: 70px;
                padding: 1.2rem 0.8rem;
                border-radius: 14px;
            }
            .time-value { font-size: 2.5rem; }
            .time-label { font-size: 0.75rem; }
            .message { font-size: 1rem; }
            .sections-grid { grid-template-columns: 1fr; }
            .stats-row { gap: 0.5rem; }
            .stat-chip { font-size: 0.8rem; padding: 0.5rem 1rem; }
            .theme-switcher { top: 0.8rem; right: 0.8rem; }
        }
    </style>
</head>
<body class="theme-midnight">
    <div class="particles" id="particles"></div>

    <div class="theme-switcher">
        <div class="theme-btn active" data-theme="midnight" title="午夜紫"></div>
        <div class="theme-btn" data-theme="sunset" title="日落橘"></div>
        <div class="theme-btn" data-theme="ocean" title="海洋藍"></div>
        <div class="theme-btn" data-theme="forest" title="森林綠"></div>
    </div>

    <div class="container" id="app">
        <h1>離職倒數計時器</h1>
        <div class="target-date">目標日：2026 年 7 月 31 日</div>

        <div class="countdown">
            <div class="time-block">
                <div class="time-value" id="days">--</div>
                <div class="time-label">天</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="hours">--</div>
                <div class="time-label">時</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="minutes">--</div>
                <div class="time-label">分</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="seconds">--</div>
                <div class="time-label">秒</div>
            </div>
        </div>

        <!-- Quick stats -->
        <div class="stats-row">
            <div class="stat-chip">剩餘上班日 <strong id="workDays">--</strong></div>
            <div class="stat-chip">剩餘發薪 <strong id="paydays">--</strong> 次</div>
            <div class="stat-chip">已撐過 <strong id="survivedDays">--</strong> 天</div>
        </div>

        <!-- Progress bar with milestones -->
        <div class="progress-section">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="milestones" id="milestones"></div>
            <div class="progress-text">自由進度 <span id="progressText">0%</span></div>
        </div>

        <!-- Daily quote -->
        <div class="daily-quote">
            <div class="daily-quote-label">今日一句</div>
            <div class="quote-text" id="quoteText"></div>
            <div class="quote-author" id="quoteAuthor"></div>
        </div>

        <!-- Two-column sections -->
        <div class="sections-grid">
            <!-- Check-in & Mood -->
            <div class="section-card">
                <h3>每日打卡</h3>
                <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">打卡！又撐過一天</button>
                <div class="checkin-info">
                    <span class="streak-badge" id="streakBadge">0 天連續</span>
                    <span style="margin-left: 0.5rem;">總打卡 <strong id="totalCheckins">0</strong> 天</span>
                </div>
                <div class="checkin-calendar" id="checkinCalendar"></div>

                <h3 style="margin-top: 1.2rem;">今天心情</h3>
                <div class="mood-row" id="moodRow">
                    <button class="mood-btn" data-mood="great" onclick="setMood('great')">😆</button>
                    <button class="mood-btn" data-mood="good" onclick="setMood('good')">😊</button>
                    <button class="mood-btn" data-mood="okay" onclick="setMood('okay')">😐</button>
                    <button class="mood-btn" data-mood="bad" onclick="setMood('bad')">😩</button>
                    <button class="mood-btn" data-mood="angry" onclick="setMood('angry')">🤬</button>
                </div>
                <div class="mood-label" id="moodLabel"></div>
                <div class="mood-history" id="moodHistory"></div>
            </div>

            <!-- Bucket list -->
            <div class="section-card">
                <h3>離職後想做的事</h3>
                <div class="bucket-input-row">
                    <input class="bucket-input" id="bucketInput" placeholder="加入新願望..." maxlength="50" onkeydown="if(event.key==='Enter')addBucket()">
                    <button class="bucket-add-btn" onclick="addBucket()">+</button>
                </div>
                <ul class="bucket-list" id="bucketList"></ul>
            </div>
        </div>

        <!-- Fun stats -->
        <div class="section-card" style="margin-top: 1.5rem;">
            <h3>趣味統計</h3>
            <div class="fun-stats" id="funStats"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const TARGET_DATE = new Date('2026-07-31T00:00:00');
        const START_DATE = new Date('2026-04-02T00:00:00');

        // ==================== Theme ====================
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
            localStorage.setItem('gone-theme', theme);
            // Recreate particles with new color
            const pc = document.getElementById('particles');
            pc.innerHTML = '';
            createParticles();
        }

        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => setTheme(btn.dataset.theme));
        });

        const savedTheme = localStorage.getItem('gone-theme');
        if (savedTheme) setTheme(savedTheme);

        // ==================== Quotes ====================
        const quotes = [
            { text: '生命不是要等待暴風雨過去，而是要學會在雨中跳舞。', author: '薇薇安・乃乃 Greene' },
            { text: '如果你不喜歡某件事，就改變它。如果你不能改變它，就改變你的態度。', author: 'Maya Angelou' },
            { text: '最困難的路，往往通往最美麗的風景。', author: '佚名' },
            { text: '不要害怕放棄好的，去追求更好的。', author: 'John D. Rockefeller' },
            { text: '當一扇門關閉，另一扇門就會打開。', author: 'Alexander Graham Bell' },
            { text: '做你害怕做的事，恐懼就會消失。', author: 'Ralph Waldo Emerson' },
            { text: '人生苦短，不要把時間浪費在不值得的事情上。', author: '佚名' },
            { text: '改變不會自己來，你就是改變。', author: 'Barack Obama' },
            { text: '每一天都是一個新的開始，把握機會重新出發。', author: '佚名' },
            { text: '你的時間有限，不要浪費在過別人的生活。', author: 'Steve Jobs' },
            { text: '勇氣不是沒有恐懼，而是判斷有比恐懼更重要的事。', author: 'Ambrose Redmoon' },
            { text: '世界上最勇敢的事，就是對自己誠實。', author: '佚名' },
            { text: '人生就像騎自行車，要保持平衡就得不斷前進。', author: 'Albert Einstein' },
            { text: '如果你正經歷地獄，那就繼續走下去。', author: 'Winston Churchill' },
            { text: '成功不是終點，失敗也不是末日，重要的是繼續前進的勇氣。', author: 'Winston Churchill' },
            { text: '有時候你必須放手，才能看看是否值得抓住。', author: '佚名' },
            { text: '最好的投資就是投資自己。', author: 'Warren Buffett' },
            { text: '與其擔心未來，不如好好把握現在。', author: '佚名' },
            { text: '自由不是做你想做的事，而是有能力不做你不想做的事。', author: 'Jean-Jacques Rousseau' },
            { text: '今天的忍耐，是為了明天的精彩。', author: '佚名' },
            { text: '凡事起頭難，但不起頭更難。', author: '佚名' },
            { text: '未來屬於那些相信夢想之美的人。', author: 'Eleanor Roosevelt' },
            { text: '如果機會不來敲門，那就自己建一扇門。', author: 'Milton Berle' },
            { text: '不是因為事情困難我們才不敢做，而是因為我們不敢做事情才困難。', author: 'Seneca' },
            { text: '生活不會因為你的恐懼而變得更簡單，但會因為你的勇敢而變得更精彩。', author: '佚名' },
            { text: '放棄安穩的路，才能發現更遼闊的風景。', author: '佚名' },
            { text: '你不需要看到整段階梯，只要踏出第一步。', author: 'Martin Luther King Jr.' },
            { text: '世界上沒有絕路，只有想不通的人。', author: '佚名' },
            { text: '離開，是為了更好的相遇。', author: '佚名' },
            { text: '能夠說「我不幹了」的人，往往是最有勇氣的人。', author: '佚名' },
        ];

        function setDailyQuote() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const q = quotes[dayOfYear % quotes.length];
            document.getElementById('quoteText').textContent = '「' + q.text + '」';
            document.getElementById('quoteAuthor').textContent = '— ' + q.author;
        }

        // ==================== Working days ====================
        function getWorkingDays(start, end) {
            let count = 0;
            const cur = new Date(start);
            while (cur < end) {
                const day = cur.getDay();
                if (day !== 0 && day !== 6) count++;
                cur.setDate(cur.getDate() + 1);
            }
            return count;
        }

        // ==================== Milestones ====================
        function renderMilestones(progress) {
            const marks = [
                { pct: 0, label: '起點' },
                { pct: 25, label: '25%' },
                { pct: 50, label: '一半！' },
                { pct: 75, label: '75%' },
                { pct: 100, label: '自由！' },
            ];
            const container = document.getElementById('milestones');
            container.innerHTML = marks.map(m =>
                `<div class="milestone ${progress >= m.pct ? 'reached' : ''}">${m.label}</div>`
            ).join('');
        }

        // ==================== Check-in ====================
        function getCheckins() {
            return JSON.parse(localStorage.getItem('gone-checkins') || '[]');
        }

        function saveCheckins(arr) {
            localStorage.setItem('gone-checkins', JSON.stringify(arr));
        }

        function todayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function doCheckin() {
            const checkins = getCheckins();
            const today = todayStr();
            if (checkins.includes(today)) return;
            checkins.push(today);
            saveCheckins(checkins);
            renderCheckin();
            // Confetti burst!
            launchConfetti(30);
        }

        function getStreak(checkins) {
            if (!checkins.length) return 0;
            const sorted = [...checkins].sort().reverse();
            const today = todayStr();
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
            let streak = 1;
            for (let i = 1; i < sorted.length; i++) {
                const prev = new Date(sorted[i - 1]);
                const cur = new Date(sorted[i]);
                const diff = (prev - cur) / 86400000;
                if (diff === 1) streak++;
                else break;
            }
            return streak;
        }

        function renderCheckin() {
            const checkins = getCheckins();
            const today = todayStr();
            const btn = document.getElementById('checkinBtn');

            if (checkins.includes(today)) {
                btn.disabled = true;
                btn.textContent = '今天已打卡 ✓';
            } else {
                btn.disabled = false;
                btn.textContent = '打卡！又撐過一天';
            }

            const streak = getStreak(checkins);
            document.getElementById('streakBadge').textContent = streak + ' 天連續';
            document.getElementById('totalCheckins').textContent = checkins.length;

            // Calendar (last 28 days)
            const cal = document.getElementById('checkinCalendar');
            cal.innerHTML = '';
            for (let i = 27; i >= 0; i--) {
                const d = new Date(Date.now() - i * 86400000);
                const ds = d.toISOString().split('T')[0];
                const div = document.createElement('div');
                div.classList.add('cal-day');
                if (checkins.includes(ds)) div.classList.add('checked');
                if (ds === today) div.classList.add('today');
                div.title = ds;
                cal.appendChild(div);
            }
        }

        // ==================== Mood ====================
        function getMoods() {
            return JSON.parse(localStorage.getItem('gone-moods') || '{}');
        }

        function setMood(mood) {
            const moods = getMoods();
            moods[todayStr()] = mood;
            localStorage.setItem('gone-moods', JSON.stringify(moods));
            renderMood();
        }

        const moodEmojis = { great: '😆', good: '😊', okay: '😐', bad: '😩', angry: '🤬' };
        const moodLabels = { great: '超開心', good: '還不錯', okay: '普通', bad: '很累', angry: '想翻桌' };

        function renderMood() {
            const moods = getMoods();
            const today = todayStr();
            const todayMood = moods[today];

            document.querySelectorAll('.mood-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.mood === todayMood);
            });

            document.getElementById('moodLabel').textContent = todayMood ? '今天的心情：' + moodLabels[todayMood] : '選一個心情吧';

            // Last 14 days mood history
            const history = document.getElementById('moodHistory');
            history.innerHTML = '';
            for (let i = 13; i >= 0; i--) {
                const d = new Date(Date.now() - i * 86400000).toISOString().split('T')[0];
                const m = moods[d];
                const span = document.createElement('span');
                span.classList.add('mood-dot');
                span.textContent = m ? moodEmojis[m] : '·';
                span.title = d;
                history.appendChild(span);
            }
        }

        // ==================== Bucket list ====================
        function getBuckets() {
            return JSON.parse(localStorage.getItem('gone-buckets') || '[]');
        }

        function saveBuckets(arr) {
            localStorage.setItem('gone-buckets', JSON.stringify(arr));
        }

        function addBucket() {
            const input = document.getElementById('bucketInput');
            const text = input.value.trim();
            if (!text) return;
            const buckets = getBuckets();
            buckets.push({ text, done: false, id: Date.now() });
            saveBuckets(buckets);
            input.value = '';
            renderBuckets();
        }

        function toggleBucket(id) {
            const buckets = getBuckets();
            const item = buckets.find(b => b.id === id);
            if (item) item.done = !item.done;
            saveBuckets(buckets);
            renderBuckets();
        }

        function deleteBucket(id) {
            const buckets = getBuckets().filter(b => b.id !== id);
            saveBuckets(buckets);
            renderBuckets();
        }

        function renderBuckets() {
            const buckets = getBuckets();
            const list = document.getElementById('bucketList');
            list.innerHTML = buckets.map(b => `
                <li class="bucket-item ${b.done ? 'done' : ''}">
                    <input type="checkbox" ${b.done ? 'checked' : ''} onchange="toggleBucket(${b.id})">
                    <span class="bucket-text">${escapeHtml(b.text)}</span>
                    <button class="bucket-delete" onclick="deleteBucket(${b.id})" title="刪除">×</button>
                </li>
            `).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== Fun stats ====================
        function renderFunStats(diffMs) {
            const days = diffMs / (1000 * 60 * 60 * 24);
            const hours = diffMs / (1000 * 60 * 60);
            const minutes = diffMs / (1000 * 60);

            const stats = [
                { label: '相當於看幾部電影（2hr）', value: Math.floor(hours / 2) + ' 部' },
                { label: '大約還要睡幾覺', value: Math.floor(days) + ' 覺' },
                { label: '還要吃幾頓午餐', value: Math.floor(days) + ' 頓' },
                { label: '剩餘通勤次數（來回）', value: Math.floor(getWorkingDays(new Date(), TARGET_DATE)) * 2 + ' 趟' },
                { label: '相當於幾首歌（3.5min）', value: Math.floor(minutes / 3.5).toLocaleString() + ' 首' },
                { label: '還要開幾次週會', value: Math.floor(days / 7) + ' 次' },
            ];

            document.getElementById('funStats').innerHTML = stats.map(s =>
                `<div class="fun-stat"><span>${s.label}</span><span class="fun-stat-val">${s.value}</span></div>`
            ).join('');
        }

        // ==================== Confetti ====================
        function launchConfetti(count) {
            const colors = ['#ffd200', '#f7971e', '#e94560', '#00d2ff', '#95d5b2', '#ff6b6b', '#feca57'];
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // ==================== Main countdown ====================
        const messages = [
            '再撐一下，自由就在前方 ✨',
            '每一秒都在靠近新的開始 🚀',
            '倒數中… 未來的你會感謝現在的你 💪',
            '自由的空氣越來越近了 🌊',
            '新的冒險即將展開 🗺️',
            '你值得更好的生活 🌟',
            '堅持住，黎明就在眼前 🌅',
        ];

        function updateCountdown() {
            const now = new Date();
            const diff = TARGET_DATE - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressText').textContent = '100%';
                document.getElementById('message').textContent = '🎉 恭喜！你自由了！新的旅程開始了！🎉';
                document.getElementById('app').classList.add('celebration');
                renderMilestones(100);
                launchConfetti(100);
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // Stats
            document.getElementById('workDays').textContent = getWorkingDays(now, TARGET_DATE);
            // Paydays: assuming monthly on last day of month
            let payCount = 0;
            const tempDate = new Date(now);
            while (tempDate < TARGET_DATE) {
                tempDate.setMonth(tempDate.getMonth() + 1);
                const lastDay = new Date(tempDate.getFullYear(), tempDate.getMonth(), 0);
                if (lastDay <= TARGET_DATE) payCount++;
            }
            document.getElementById('paydays').textContent = payCount;
            document.getElementById('survivedDays').textContent = Math.floor((now - START_DATE) / (1000 * 60 * 60 * 24));

            // Progress
            const totalDuration = TARGET_DATE - START_DATE;
            const elapsed = now - START_DATE;
            const progress = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);
            document.getElementById('progressBar').style.width = progress.toFixed(2) + '%';
            document.getElementById('progressText').textContent = progress.toFixed(1) + '%';
            renderMilestones(progress);

            // Message
            const msgIndex = Math.floor(seconds / 9) % messages.length;
            document.getElementById('message').textContent = messages[msgIndex];

            // Fun stats (update every 10 seconds)
            if (seconds % 10 === 0) renderFunStats(diff);
        }

        // ==================== Particles ====================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
                particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // ==================== Init ====================
        createParticles();
        setDailyQuote();
        renderCheckin();
        renderMood();
        renderBuckets();
        updateCountdown();
        renderFunStats(TARGET_DATE - new Date());
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
