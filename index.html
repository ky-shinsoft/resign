<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離職倒數計時器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .target-date {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 3rem;
        }

        .countdown {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-block {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            min-width: 130px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .time-block:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .time-value {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(180deg, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .time-label {
            font-size: 1rem;
            color: #888;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-section {
            margin-top: 3rem;
            width: 500px;
            max-width: 90vw;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            height: 16px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            transition: width 1s ease;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            margin-top: 0.8rem;
            font-size: 1rem;
            color: #aaa;
        }

        .progress-text span {
            color: #ffd200;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .message {
            margin-top: 2.5rem;
            font-size: 1.3rem;
            color: #ccc;
            font-style: italic;
        }

        /* Celebration mode */
        .celebration h1 {
            font-size: 4rem;
            background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 2s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 210, 0, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .countdown { gap: 0.8rem; }
            .time-block {
                min-width: 70px;
                padding: 1.2rem 0.8rem;
                border-radius: 14px;
            }
            .time-value { font-size: 2.5rem; }
            .time-label { font-size: 0.75rem; }
            .message { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container" id="app">
        <h1>離職倒數計時器</h1>
        <div class="target-date">目標日：2026 年 7 月 31 日</div>

        <div class="countdown">
            <div class="time-block">
                <div class="time-value" id="days">--</div>
                <div class="time-label">天</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="hours">--</div>
                <div class="time-label">時</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="minutes">--</div>
                <div class="time-label">分</div>
            </div>
            <div class="time-block">
                <div class="time-value" id="seconds">--</div>
                <div class="time-label">秒</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="progress-text">自由進度 <span id="progressText">0%</span></div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const TARGET_DATE = new Date('2026-07-31T00:00:00');
        const START_DATE = new Date('2026-04-02T00:00:00');

        const messages = [
            '再撐一下，自由就在前方 ✨',
            '每一秒都在靠近新的開始 🚀',
            '倒數中… 未來的你會感謝現在的你 💪',
            '自由的空氣越來越近了 🌊',
            '新的冒險即將展開 🗺️',
        ];

        function updateCountdown() {
            const now = new Date();
            const diff = TARGET_DATE - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressText').textContent = '100%';
                document.getElementById('message').textContent = '🎉 恭喜！你自由了！新的旅程開始了！🎉';
                document.getElementById('app').classList.add('celebration');
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // Progress
            const totalDuration = TARGET_DATE - START_DATE;
            const elapsed = now - START_DATE;
            const progress = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);
            document.getElementById('progressBar').style.width = progress.toFixed(2) + '%';
            document.getElementById('progressText').textContent = progress.toFixed(1) + '%';

            // Rotating message
            const msgIndex = Math.floor(seconds / 12) % messages.length;
            document.getElementById('message').textContent = messages[msgIndex];
        }

        // Floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
                particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
